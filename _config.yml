title: "HTB Academy CJCA Writeups"
description: "Hands-on cybersecurity writeups and notes from the HTB Academy CJCA path."

# 🔥 IMPORTANT FIX
remote_theme: just-the-docs/just-the-docs

url: "https://4bh1-03.github.io/htb-academy-cjca-writeups"

search_enabled: true

aux_links:
  "GitHub Repo":
    - "https://github.com/4bh1-03/htb-academy-cjca-writeups"

color_scheme: dark

footer_content: "© 2026 Abhi | Cybersecurity Learning Journey"

enable_copy_code_button: true

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
    values:
      layout: default
